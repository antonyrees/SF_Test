<template>
    <div>
        <div class="slds-col fieldcontainer">
            <lightning-input
                type="text"
                data-id="postcode" 
                value={postcode}
                label="Postcode"
                field-level-help="Enter your postcode to select your address from the list."
                onchange={findADdresses}></lightning-input>
        </div>
    </div>

    <div lwc:if={showSpinner} class="slds-is-relative" style="top: -16px;">
        <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
    </div>

    <span lwc:if={postCodeNotFoundError} class="error">Sorry but the information isn't letting us find your address. Please check and try again</span>

    <div lwc:if={addresses} class="fieldcontainer">
        <select class="slds-select" id="select-01" onblur={handleAddressSelected}>
            <option hidden value="">-- Please Select Your Address --</option>
            <template for:each={addresses} for:item="address">
               <option key={address.propertyReference} value={address.propertyReference} selected={address.selected}>{address.address}</option>
            </template>
        </select>
        <span lwc:if={addressNotSelectedError} class="error">Please select your address from the list.</span>
    </div>
</template>
